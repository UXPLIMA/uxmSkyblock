# Island roles.
# Set each role's display name and permissions here.
# The owner always has every permission.
#
# Permissions: BLOCK_PLACE, BLOCK_BREAK, INTERACT, CONTAINER, FARM,
# PICKUP_ITEMS, DROP_ITEMS, DAMAGE_MOBS, INVITE, KICK, BAN, SET_HOME,
# SET_WARP, TOGGLE_SETTINGS, UPGRADE, MANAGE_MEMBERS, FLY, DELETE_ISLAND,
# TRANSFER  ('*' = all)

roles:
  visitor:
    name: "&7Visitor"
    permissions: []

  farmer:
    name: "&aFarmer"
    permissions:
      - FARM
      - INTERACT

  member:
    name: "&fMember"
    permissions:
      - BLOCK_PLACE
      - BLOCK_BREAK
      - INTERACT
      - CONTAINER
      - FARM
      - PICKUP_ITEMS
      - DROP_ITEMS
      - DAMAGE_MOBS
      - FLY

  architect:
    name: "&bArchitect"
    permissions:
      - BLOCK_PLACE
      - BLOCK_BREAK
      - INTERACT
      - CONTAINER
      - FARM
      - PICKUP_ITEMS
      - DROP_ITEMS
      - DAMAGE_MOBS
      - FLY
      - SET_HOME
      - SET_WARP

  moderator:
    name: "&eModerator"
    permissions:
      - BLOCK_PLACE
      - BLOCK_BREAK
      - INTERACT
      - CONTAINER
      - FARM
      - PICKUP_ITEMS
      - DROP_ITEMS
      - DAMAGE_MOBS
      - FLY
      - SET_HOME
      - SET_WARP
      - INVITE
      - KICK
      - BAN
      - TOGGLE_SETTINGS
      - UPGRADE
      - MANAGE_MEMBERS

  owner:
    name: "&6Owner"
    permissions:
      - "*"
