# Upgrades menu (/island upgrade).
# type: upgrades -> items are filled automatically from upgrades.yml,
# each upgrade's slot and icon are defined there.

title: "&8Upgrades Menu"
rows: 5
type: upgrades

# Lore template for upgradeable items.
# {level} current level, {next_level} next level,
# {current} current value, {next} next value (for the generator these show the tier).
upgrade-lore:
  - ""
  - "&7Current: &a{current} &8(Lvl {level})"
  - "&7Next: &a{next} &8(Lvl {next_level})"
  - ""
  - "&7Required Level: &e{req_level}"
  - "&7Required Money: &e{req_money}"
  - ""
  - "&eClick to upgrade!"

# Lore template for maxed-out upgrades.
upgrade-lore-max:
  - ""
  - "&7Current: &a{current} &8(Lvl {level})"
  - ""
  - "&a✔ Maximum level!"

items:
  info:
    slot: 4
    material: EXPERIENCE_BOTTLE
    name: "&bIsland Upgrades"
    lore:
      - "&7Island Level: &e{level}"
      - "&7Points: &e{points}"

  back:
    slot: 40
    material: ARROW
    name: "&cBack"
    action: "open:main"
