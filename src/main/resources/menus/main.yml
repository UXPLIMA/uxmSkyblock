# Main island menu (/island).
# type: warp -> the head slots are filled with the islands of players who are
# currently online. Clicking a head visits that island (works across servers
# when the proxy is enabled, and locally when it is not).

title: "&8Island Menu"
rows: 5
type: warp

# Slots that get filled with island heads (paginated when there are more).
head-slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]

# Head display name. %vault_group% (and any other PlaceholderAPI placeholder)
# is resolved for the island OWNER, so it shows their rank/prefix.
head-name: "&7[&b%vault_group%&7] &f{owner} &7[&e{level}&7]"

# Head tooltip. {member_list} expands into one line per member.
head-lore:
  - "&7Level: &e{level}"
  - "&7Points: &e{points}"
  - "&7Members: &e{members}&7/&e{team_limit}"
  - "&7Visitors: {lock_state}"
  - ""
  - "{member_list}"
  - ""
  - "&eClick to visit this island!"

# Format of each member line inside {member_list}.
member-format: "&8• &f{player} &7{role}"

items:
  help:
    slot: 36
    material: BOOK
    name: "&aHelp & Commands"
    lore:
      - "&7View the command list."
    action: "open:help"

  home:
    slot: 37
    material: GRASS_BLOCK
    name: "&aGo To My Island"
    lore:
      - "&eClick to teleport to your island!"
    action: "island:git"

  create:
    slot: 38
    material: NETHER_STAR
    name: "&aCreate Island"
    lore:
      - "&7Set up a new island."
    action: "island:olustur"

  prev-page:
    slot: 39
    material: ARROW
    name: "&ePrevious Page"
    action: "page:prev"

  close:
    slot: 40
    material: BARRIER
    name: "&cClose"
    action: "close"

  next-page:
    slot: 41
    material: ARROW
    name: "&eNext Page"
    action: "page:next"

  settings:
    slot: 42
    material: COMPARATOR
    name: "&eSettings"
    lore:
      - "&eClick to change your island settings."
    action: "island:ayarlar"

  upgrades:
    slot: 43
    material: EXPERIENCE_BOTTLE
    name: "&bUpgrades"
    lore:
      - "&eClick to open the upgrades menu."
    action: "island:yukseltme"

  delete:
    slot: 44
    material: TNT
    name: "&cDelete Island"
    lore:
      - "&7Permanently delete your island."
    action: "open:delete-confirm"
