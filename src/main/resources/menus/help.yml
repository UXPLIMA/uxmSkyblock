# Help menu (/island help).
title: "&8Help & Commands"
rows: 3
type: normal

items:
  help:
    slot: 13
    material: BOOK
    name: "&aHelp & Commands"
    lore:
      - "&e/island &7– Opens this menu"
      - "&e/island home &7– Teleports to your island"
      - "&e/island create &7– Creates a new island"
      - "&e/island visit <name> &7– Visits a player's island"
      - "&e/island invite <name> &7– Invites a player"
      - "&e/island accept &7– Accepts an invite"
      - "&e/island leave &7– Leaves the island"
      - "&e/island kick <name> &7– Kicks a member"
      - "&e/island transfer <name> &7– Transfers ownership"
      - "&e/island settings &7– Opens island settings"
      - "&e/island upgrade &7– Island upgrades"
      - "&e/island level &7– Shows your island level"
      - "&e/island ban/unban <name> &7– Bans/unbans a player"
      - "&e/island trust/untrust <name> &7– Member access"

  close:
    slot: 22
    material: ARROW
    name: "&cClose"
    action: "close"
