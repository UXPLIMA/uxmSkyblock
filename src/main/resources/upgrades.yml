# Island upgrades.
# Each upgrade has levels. Moving to a level requires 'required-level'
# (island level) and 'required-money' (Vault, when economy is enabled).
#
# type: value     -> 'value' is a number (limit / multiplier / size)
# type: generator -> 'chances' are weighted block chances

upgrades:

  # Team limit -> value = max members including the owner.
  team-limit:
    display-name: "&eTeam Limit"
    icon: PLAYER_HEAD
    slot: 10
    type: value
    levels:
      1: { value: 4,  required-level: 0,  required-money: 0 }
      2: { value: 6,  required-level: 5,  required-money: 5000 }
      3: { value: 8,  required-level: 12, required-money: 15000 }
      4: { value: 12, required-level: 25, required-money: 40000 }

  # Island size -> value = full island size (blocks across). Protection radius is value/2.
  size:
    display-name: "&aIsland Size"
    icon: GRASS_BLOCK
    slot: 12
    type: value
    levels:
      1: { value: 100, required-level: 0,  required-money: 0 }
      2: { value: 140, required-level: 8,  required-money: 10000 }
      3: { value: 180, required-level: 20, required-money: 30000 }
      4: { value: 220, required-level: 40, required-money: 75000 }

  # Crop growth -> value = chance (%) to double a fully grown crop when harvested.
  crop-growth:
    display-name: "&2Crop Double Chance"
    icon: WHEAT
    slot: 14
    type: value
    levels:
      1: { value: 0,  required-level: 0,  required-money: 0 }
      2: { value: 15, required-level: 5,  required-money: 8000 }
      3: { value: 30, required-level: 15, required-money: 20000 }
      4: { value: 50, required-level: 30, required-money: 50000 }

  # Mob drops -> value = drop multiplier (1 = normal, 2 = double).
  mob-drops:
    display-name: "&cMob Drops"
    icon: ROTTEN_FLESH
    slot: 16
    type: value
    levels:
      1: { value: 1, required-level: 0,  required-money: 0 }
      2: { value: 2, required-level: 10, required-money: 12000 }
      3: { value: 3, required-level: 25, required-money: 35000 }

  # Spawner rates -> value = delay multiplier (1.0 normal, 0.5 = twice as fast).
  spawner-rates:
    display-name: "&bSpawner Rates"
    icon: SPAWNER
    slot: 20
    type: value
    levels:
      1: { value: 1.0, required-level: 0,  required-money: 0 }
      2: { value: 0.7, required-level: 12, required-money: 20000 }
      3: { value: 0.4, required-level: 30, required-money: 60000 }

  # Generator -> weighted block chances per tier.
  generator:
    display-name: "&7Generator"
    icon: COBBLESTONE
    slot: 24
    type: generator
    levels:
      1:
        required-level: 0
        required-money: 0
        chances:
          COBBLESTONE: 100
      2:
        required-level: 6
        required-money: 8000
        chances:
          COBBLESTONE: 80
          COAL_ORE: 15
          IRON_ORE: 5
      3:
        required-level: 18
        required-money: 25000
        chances:
          COBBLESTONE: 60
          IRON_ORE: 20
          GOLD_ORE: 15
          DIAMOND_ORE: 5
      4:
        required-level: 35
        required-money: 70000
        chances:
          COBBLESTONE: 40
          IRON_ORE: 25
          GOLD_ORE: 20
          DIAMOND_ORE: 12
          EMERALD_ORE: 3
