# Block values.
# Each block placed on an island adds this many points; breaking it removes
# the same amount. Points are used to level up (see levels.yml).
# Blocks not listed here give 'default-value' points.

# Default points for blocks that are not listed (0 = no points).
default-value: 0.0

values:
  LAPIS_BLOCK: 0.2
  NETHERITE_BLOCK: 10.0
  COAL_BLOCK: 0.2
  DIAMOND_BLOCK: 2.5
  QUARTZ_BLOCK: 1.5
  REDSTONE_BLOCK: 0.3
  EMERALD_BLOCK: 1.5
  HONEYCOMB_BLOCK: 1000.0
  GOLD_BLOCK: 0.8
  COPPER_BLOCK: 0.6
  IRON_BLOCK: 0.6
  AMETHYST_BLOCK: 0.4
  NETHERITE_SCRAP: 0.0
  STONE: 0.01
  OAK_LOG: 0.05
  GRASS_BLOCK: 0.02
