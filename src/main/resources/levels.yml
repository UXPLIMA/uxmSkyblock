# Island levels.
# Total points required to reach a level.
# e.g. level 1 = 100 points, level 2 = 250 points ...
# Points are earned from the blocks in block-values.yml.

requirements:
  1: 100
  2: 250
  3: 500
  4: 1000
  5: 2000
  6: 3500
  7: 5500
  8: 8000
  9: 12000
  10: 18000

# Levels beyond the highest one defined above are generated automatically.
auto:
  enabled: true
  # Base points added for each new level past the last defined one.
  step: 8000
  # 'step' is multiplied by this each level (1.0 = constant increase).
  multiplier: 1.15
