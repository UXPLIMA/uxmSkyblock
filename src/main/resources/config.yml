# ╔══════════════════════════════════════════════════════════════╗
# ║  SKYBLOCK ANA AYARLARI                                          ║
# ╚══════════════════════════════════════════════════════════════╝

world:
  name: islands
  island-height: 100
  island-distance: 250
  # Varsayılan ada boyutu (boyut yükseltmesi yoksa kullanılır).
  island-size: 100

# ───────────── ADA SINIRI (BORDER) ─────────────
# Oyuncu adaya girince ada sınırını gösteren (kişiye özel) bir dünya sınırı çizer.
border:
  enabled: true
  # Sınır rengi: BLUE (sabit/mavi), GREEN (yeşil) veya RED (kırmızı).
  color: BLUE

# ───────────── GENEL SPAWN ─────────────
# Ada silinince (ve spawn'a dönüşte) oyuncunun ışınlanacağı nokta.
# Hem proxy hem proxysiz sistemde geçerlidir.
#  - Proxy AÇIKSA ve proxy.spawn-server bu sunucudan farklıysa: oyuncu önce o
#    sunucuya gönderilir (oradaki spawn'a düşer); aşağıdaki koordinat kullanılmaz.
#  - Proxy KAPALIYSA (veya spawn-server bu sunucuysa): aşağıdaki koordinata ışınlar.
# world boş ("") ise ana dünyanın spawn'ı kullanılır.
# Kolay yol: gitmesini istediğin yere gidip /ada anaspawn yaz.
spawn:
  world: ""
  x: 0.5
  y: 100
  z: 0.5
  yaw: 0
  pitch: 0

creation:
  max-concurrent: 3
  threads: 3

# ───────────── KOMUT ─────────────
# Ana komut adı ve alias'ları config'den ayarlanabilir.
# Alt komut alias'ları da burada; soldaki anahtar sabit (kod tarafı),
# sağdaki liste oyuncunun yazabileceği kelimelerdir.
command:
  name: ada
  aliases:
    - is
    - sb
    - island
    - sky
  subcommands:
    menu: ["menu"]
    git: ["git", "go", "tp", "ışınlan", "home"]
    ziyaret: ["ziyaret", "visit", "git-ada"]
    olustur: ["oluştur", "olustur", "create", "kur"]
    sil: ["sil", "delete", "kaldır"]
    davet: ["davet", "invite"]
    kabul: ["kabul", "accept"]
    reddet: ["reddet", "deny", "ret"]
    ayril: ["ayrıl", "ayril", "leave"]
    at: ["at", "kick", "çıkar", "cikar"]
    devret: ["devret", "transfer"]
    ban: ["ban", "yasakla"]
    unban: ["unban", "yasaklama-kaldır", "bankaldir"]
    trust: ["trust", "güven", "guven"]
    untrust: ["untrust"]
    rol: ["rol", "role", "setrole"]
    ayarlar: ["ayarlar", "settings", "ayar"]
    yukseltme: ["yükseltme", "yukseltme", "upgrade", "yukselt"]
    level: ["level", "seviye", "lvl"]
    setspawn: ["setspawn", "sethome", "spawnayarla"]
    ucus: ["uçuş", "ucus", "fly"]
    kilit: ["kilit", "lock", "kapat"]
    bilgi: ["bilgi", "info"]
    uyeler: ["üyeler", "uyeler", "members"]
    proxy: ["proxy", "durum"]
    anaspawn: ["anaspawn", "genelspawn", "setanaspawn"]
    yardim: ["yardım", "yardim", "help", "?"]
  # Davetlerin geçerlilik süresi (saniye).
  invite-expire-seconds: 120

# ───────────── EKONOMI ─────────────
economy:
  # Yükseltmelerde 'required-money' (Vault parası) şartı aransın mı?
  # Vault yoksa otomatik kapanır ve sadece seviye şartı geçerli olur.
  enabled: true

# ───────────── ŞEMATİKLER ─────────────
schematics:
  default: classic
  list:
    classic:
      display-name: "&aClassic"
      file: classic.schem
      home-offset:
        x: 0.5
        y: 5.0
        z: 0.5
    desert:
      display-name: "&eDesert"
      file: desert.schem
      home-offset:
        x: 0.5
        y: 5.0
        z: 0.5

# ───────────── VERİTABANI ─────────────
storage:
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: skyblock
    username: root
    password: ""
    ssl: false

# ╔══════════════════════════════════════════════════════════════╗
# ║  PROXY MODÜLÜ (sunucular arası senkron)                        ║
# ╚══════════════════════════════════════════════════════════════╝
# Birden fazla skyblock backend sunucusunu Velocity/BungeeCord arkasında
# çalıştırmak içindir. Tüm backend'ler AYNI MySQL'i paylaşmalıdır
# (storage.type: mysql ve hepsinde aynı host/database).
#
# Çalışma şekli:
#  - Her ada fiziksel olarak tek bir backend sunucuda barınır (oluşturulduğu yerde).
#  - /ada git veya /ada ziyaret <oyuncu> ile, ada başka sunucudaysa oyuncu
#    otomatik olarak doğru sunucuya gönderilir ve adasına ışınlanır.
#  - Ada verisi değiştiğinde (üye, rol, bayrak, level) Redis üzerinden diğer
#    sunuculara bildirilir; onlar da veriyi DB'den tazeler.
#
# NOT: Oyuncuların skyblock sunucularına dengeli dağıtımı (load-balancing)
# lobi/proxy işidir; bu modül adayı, oyuncunun oluşturduğu sunucuda inşa eder.
#
# MİGRASYON (önemli): Tek sunucudan çoklu sunucuya geçiyorsan, var olan tüm
# adalar zaten o tek sunucunun dünyasında fizikseldir. Proxy'yi açmadan ÖNCE
# bu adaların DB'deki 'server' sütununu o sunucunun adıyla doldur (tek SQL:
#   UPDATE islands SET server = 'skyblock-1' WHERE server IS NULL;).
# Aksi halde 'server' boş bir adaya, ona ilk erişen sunucu kendini atar ve
# blokları başka sunucuda olan oyuncu boş alana ışınlanabilir.
proxy:
  # Modül kapalıyken plugin tek sunucu gibi normal çalışır.
  enabled: false

  # Bu sunucunun Velocity/BungeeCord yapılandırmasındaki adı.
  # HER backend sunucuda FARKLI olmalı (örn: skyblock-1, skyblock-2).
  server-name: "skyblock-1"

  # Spawn/lobi sunucusunun adı (ileride dönüş yönlendirmeleri için).
  spawn-server: "spawn-1"

  # Yeni adaların oluşturulabileceği skyblock backend sunucularının LİSTESİ.
  # Oyuncu BAŞKA bir sunucudayken (ör. spawn/lobi) /ada oluştur derse, listedeki
  # EN AZ adası olan sunucuya gönderilir ve ada ORADA oluşturulur (dengeli dağıtım).
  # - Liste boşsa ada, komutun çalıştığı sunucuda oluşturulur.
  # - Bu sunucunun server-name'i listedeyse, oyuncu burada oluşturursa yerel kalır.
  # Yeni skyblock sunucusu eklemek için sadece adını bu listeye yaz (skyblock-2, 3, 4...).
  create-servers:
    - "skyblock-1"
    - "skyblock-2"

  # Oyuncu başka sunucuya gönderildikten sonra ışınlanma/oluşturma kaydının
  # geçerli kalacağı süre (saniye).
  pending-teleport-seconds: 30

  # Sorun gidermek için konsola ayrıntılı log basar (yönlendirme, gelen mesajlar).
  debug: false

  # Sunucular arası anlık haberleşme için Redis bağlantısı.
  # Tüm backend'ler AYNI Redis'e ve AYNI kanala bağlanmalıdır.
  redis:
    host: "localhost"
    port: 6379
    username: ""
    password: ""
    timeout-seconds: 2
    # Senkron mesajlarının yayınlandığı kanal adı (tüm sunucularda aynı olmalı).
    channel: "skyblock:proxy"
