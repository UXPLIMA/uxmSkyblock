# Main uxmSkyblock settings.
# New keys added in plugin updates are merged into this file automatically,
# so your existing values are kept when you upgrade.

# uxmSkyblock island system. Set to false on a server that should run ONLY a
# module (e.g. Chunklock): the /ada (island) command, island listeners and the
# island world stay unregistered, but core managers (economy, block values,
# storage, proxy, module loader) keep working so modules can use them.
island:
  enabled: true
  # Clear a player's inventory when they leave (or are kicked from) an island.
  # Prevents members from walking off with island loot. Default: false.
  clear-inventory-on-leave: false

world:
  name: islands
  # World generator: 'void' (classic skyblock empty world) or 'normal'
  # (real, naturally-generated terrain). Use 'normal' for the Chunklock module
  # so islands sit on natural ground and locked chunks reveal real terrain.
  generator: void
  island-height: 100
  island-distance: 250
  # Default island size, used when the size upgrade is not present.
  island-size: 100

# Per-island Nether and End dimensions. Each island gets its OWN plot at the
# same grid coordinates as its overworld island, in a dedicated void world, and
# reaches it through real portals (a nether portal you build, then an end portal
# waiting in your nether plot). The plots are generated the first time a player
# travels there and live on the same backend server as the island, so this works
nether:
  enabled: true
  world-name: islands_nether
  island-height: 64
  schematic: nether.schem
  home-offset:
    x: 6.5
    y: 3.0
    z: 6.5
    yaw: 0.0
end:
  enabled: true
  world-name: islands_the_end
  island-height: 64
  schematic: end.schem
  home-offset:
    x: 7.5
    y: 4.0
    z: 10.5
    yaw: 180.0

# Per-player world border drawn around an island when a player enters it.
border:
  enabled: true
  # Border color: BLUE, GREEN or RED.
  color: BLUE

# Where players are teleported after their island is deleted (and on spawn return).
# Works with and without the proxy module.
#  - Proxy ON and proxy.spawn-server is a different server: the player is sent
#    to that server (and lands on its spawn); the coordinates below are not used.
#  - Proxy OFF (or spawn-server is this server): the player is teleported to the
#    coordinates below. Leave world empty ("") to use the main world spawn.
# Quick way: stand where you want and run /island anaspawn.
spawn:
  world: ""
  x: 0.5
  y: 100
  z: 0.5
  yaw: 0
  pitch: 0

creation:
  max-concurrent: 3
  threads: 3

# Command name, aliases and sub-command words. The left key is the internal
# name; the list on the right is what players may type.
command:
  name: island
  aliases:
    - is
    - sb
    - ada
    - sky
  subcommands:
    menu: ["menu"]
    git: ["home", "go", "tp", "git", "ışınlan"]
    ziyaret: ["visit", "ziyaret"]
    olustur: ["create", "oluştur", "olustur", "kur"]
    sil: ["delete", "sil", "kaldır"]
    davet: ["invite", "davet"]
    kabul: ["accept", "kabul"]
    reddet: ["deny", "reddet", "ret"]
    ayril: ["leave", "ayrıl", "ayril"]
    at: ["kick", "at", "çıkar", "cikar"]
    devret: ["transfer", "devret"]
    ban: ["ban", "yasakla"]
    unban: ["unban", "bankaldir"]
    trust: ["trust", "güven", "guven"]
    untrust: ["untrust"]
    rol: ["role", "rol", "setrole"]
    ayarlar: ["settings", "ayarlar", "ayar"]
    yukseltme: ["upgrade", "yükseltme", "yukseltme", "yukselt"]
    level: ["level", "seviye", "lvl"]
    warp: ["warp", "git-warp"]
    setwarp: ["setwarp", "warpkur", "warpayarla"]
    delwarp: ["delwarp", "warpsil"]
    setspawn: ["setspawn", "sethome", "spawnayarla"]
    ucus: ["fly", "uçuş", "ucus"]
    kilit: ["lock", "kilit", "kapat"]
    border: ["border", "sınır", "sinir", "borderrenk"]
    block: ["block", "blok", "blokpuan", "bloklar"]
    bank: ["bank", "banka"]
    top: ["top", "sıralama", "siralama", "lider"]
    bilgi: ["info", "bilgi"]
    uyeler: ["members", "üyeler", "uyeler"]
    proxy: ["proxy", "status"]
    anaspawn: ["anaspawn", "setglobalspawn", "genelspawn"]
    admin: ["admin", "yonet", "yönet"]
    yardim: ["help", "yardım", "yardim", "?"]
  # How long an invite stays valid, in seconds.
  invite-expire-seconds: 120

# Public island warps. Players reach them with /island warp (menu) or
# /island warp <player>, and set them with /island setwarp or a warp sign.
warp:
  # Write this on the first line of a sign (on your island) to turn it into a
  # warp sign; the warp point is set to where you stand. Color codes not needed.
  sign-tag: "[warp]"
  # How the first line looks after the sign becomes an active warp.
  sign-display: "&9[Warp]"
  # How many named warps an island may have. The base limit applies to everyone;
  # a player can raise it with the permission 'skyblock.warps.<number>' (the
  # highest number they hold wins). Example: skyblock.warps.5 -> up to 5 warps.
  default-limit: 1
  permission-prefix: "skyblock.warps"

economy:
  # Require the upgrade 'required-money' (Vault) cost? Disabled automatically
  # if Vault is missing, in which case only the level requirement applies.
  enabled: true

# Obsidian generators. Lava that touches water turns into obsidian and the lava
# would normally be lost. With this enabled, right-clicking an obsidian block
# with an EMPTY bucket breaks it and hands the lava back as a lava bucket, so
# the generator can be reused. On an island the player needs block-break
# permission; off an island it always works.
obsidian:
  bucket-to-lava: true

# Island leaderboard (/island top) and the personal floating hologram that
# follows the player around (/island top holo). The hologram is only visible to
# the player who toggled it and works in any world (including Chunklock worlds).
top:
  # How many islands /island top lists in chat.
  chat-lines: 10
  hologram:
    # How many ranks the floating hologram shows.
    lines: 10
    # How far above the player's head the hologram floats.
    height: 2.8
    # How often (in ticks) the hologram text is refreshed. It re-follows the
    # player every 2 ticks regardless.
    refresh-ticks: 40
    title: "&6&lTOP ISLANDS"
    # {rank} {owner} {level} {points}
    entry: "&7{rank}. &f{owner} &8- &a{level} &7({points})"
    empty: "&7No islands yet."

schematics:
  default: classic
  list:
    classic:
      display-name: "&aClassic"
      file: classic.schem
      icon: GRASS_BLOCK
      home-offset:
        x: 10.5
        y: 11.0
        z: 10.5
    desert:
      display-name: "&eDesert"
      file: desert.schem
      icon: SAND
      home-offset:
        x: 0.5
        y: 5.0
        z: 0.5

storage:
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: skyblock
    username: root
    password: ""
    ssl: false

# Proxy module: keeps islands in sync across multiple backend servers behind
# Velocity/BungeeCord. All backends must share the same MySQL database
# (storage.type: mysql with identical host/database).
#
# How it works:
#  - Each island physically lives on one backend server (where it was created).
#  - /island home or /island visit <player> sends the player to the right server
#    when the island lives elsewhere, then teleports them in.
#  - Island changes (members, roles, flags, level) are published over Redis so
#    the other servers refresh that island from the database.
#
# Migrating from a single server: existing islands already live in that server's
# world, so before enabling the proxy, stamp their 'server' column with this
# server's name (one SQL statement):
#   UPDATE islands SET server = 'skyblock-1' WHERE server IS NULL;
proxy:
  # When disabled, the plugin runs as a normal single-server plugin.
  enabled: false

  # This server's name in your Velocity/BungeeCord config.
  # Must be DIFFERENT on every backend (e.g. skyblock-1, skyblock-2).
  server-name: "skyblock-1"

  # Name of the spawn/lobby server (used for return routing).
  spawn-server: "spawn-1"

  # Backend servers where new islands may be created. When a player runs
  # /island create from somewhere else (e.g. the lobby), they are sent to the
  # server in this list with the fewest islands (balanced distribution).
  #  - Empty list: the island is created on the server running the command.
  #  - If this server's name is in the list, local creations stay local.
  create-servers:
    - "skyblock-1"
    - "skyblock-2"

  # How long a pending teleport/create record stays valid after the player is
  # sent to another server, in seconds.
  pending-teleport-seconds: 30

  # Print detailed routing logs to the console for troubleshooting.
  debug: false

  # Redis connection used for cross-server messaging. All backends must connect
  # to the same Redis and the same channel.
  redis:
    host: "localhost"
    port: 6379
    username: ""
    password: ""
    timeout-seconds: 2
    # Channel sync messages are published on (must match on all servers).
    channel: "skyblock:proxy"
