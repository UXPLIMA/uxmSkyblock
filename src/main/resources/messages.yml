# All player-facing text lives here.
# Use & for color codes and {..} for placeholders.

prefix: "&8[&bIsland&8] &r"

messages:
  # General
  player-only: "&cThis command can only be used by players."
  no-permission: "&cYou don't have permission to do that."
  no-island-permission: "&cYou don't have island permission to do that."
  unknown-subcommand: "&cUnknown command. Type &e/island help&c to see the commands."
  player-not-found: "&cPlayer '{player}' was not found."

  # Island basics
  no-island: "&cYou don't have an island yet. Create one with &e/island create&c."
  already-have-island: "&cYou already have an island."
  creating: "&7Creating your island..."
  creating-in-progress: "&eYour island is already being created, please wait..."
  create-failed: "&cSomething went wrong while creating your island."
  created: "&aYour island has been created!"
  invalid-schematic: "&cUnknown island type. Available: &e{types}"
  teleporting: "&7Teleporting you to your island..."
  deleted: "&aYour island has been deleted."

  # Visiting and proxy (cross-server)
  usage-visit: "&cUsage: /island visit <name>"
  visiting: "&7Teleporting you to {player}'s island..."
  visit-no-island: "&c'{player}' does not have an island."
  visit-locked: "&cThis island is closed to visitors."
  visit-banned: "&cYou are banned from this island."
  visit-open: "&aOPEN"
  visit-closed: "&cCLOSED"
  proxy-sending: "&7Sending you to the island's server (&e{server}&7)..."
  proxy-creating: "&7Your island will be created on &e{server}&7; sending you there..."
  proxy-status: "&8» &7Proxy: &e{state} &8| &7Server: &e{server} &8| &7Create: &e{create} &8| &7Island server: &e{island}"
  proxy-state-on: "&aON"
  proxy-state-off: "&cOFF"
  proxy-create-local: "(local)"
  proxy-island-none: "(no island)"
  proxy-island-unassigned: "(unassigned)"
  must-be-on-island: "&cYou must be on your island to do that."
  spawn-set: "&aIsland spawn point has been set."
  global-spawn-set: "&aThe global spawn (where players go when an island is deleted) has been set to your location."

  # Level
  level-up: "&aCongratulations! Your island reached level &e{level}&a!"
  level-info: "&7Island Level: &e{level} &8| &7Points: &e{points} &8| &7Next: &e{next}"

  # Invites and membership
  usage-invite: "&cUsage: /island invite <name>"
  usage-kick: "&cUsage: /island kick <name>"
  usage-transfer: "&cUsage: /island transfer <name>"
  usage-ban: "&cUsage: /island ban <name>"
  usage-unban: "&cUsage: /island unban <name>"
  usage-trust: "&cUsage: /island trust <name>"
  usage-untrust: "&cUsage: /island untrust <name>"
  usage-role: "&cUsage: /island role <name> <role>"
  already-member: "&cThis player is already on your island."
  team-limit-reached: "&cYou reached the member limit (&e{limit}&c). Upgrade your team limit."
  invite-sent: "&aYou invited {player} to your island."
  invite-received: "&e{player} &ainvited you to their island! Type &e{command}&a to accept."
  invite-accepted: "&aYou accepted the invite, you now have an island!"
  invite-denied: "&7You denied the invite."
  no-invite: "&cYou don't have a pending invite."
  member-joined: "&a{player} joined the island!"
  member-left: "&7{player} left the island."
  owner-cannot-leave: "&cThe owner cannot leave. Use &e/island transfer&c first, or &e/island delete&c."
  left-island: "&7You left the island."
  not-a-member: "&cThis player is not a member of the island."
  cannot-kick-owner: "&cYou cannot kick the island owner."
  cannot-manage-higher: "&cYou cannot manage a member with an equal or higher role."
  kicked: "&a{player} was kicked from the island."
  you-were-kicked: "&cYou were kicked from the island."
  transferred: "&aIsland ownership was transferred to {player}."
  received-ownership: "&aYou are now the new owner of the island!"
  cannot-ban-owner: "&cYou cannot ban the island owner."
  banned: "&a{player} was banned from the island."
  unbanned: "&a{player} was unbanned."
  not-banned: "&cThis player is not banned."
  trusted: "&a{player} was added to your island as a member."
  you-were-trusted: "&aYou were added to an island as a member!"
  untrusted: "&a{player} was removed from your island."
  invalid-role: "&cInvalid role. Options: &e{roles}"
  role-set: "&a{player}'s role was set to {role}&a."

  # Flight and lock
  fly-on: "&aFlight mode enabled."
  fly-off: "&7Flight mode disabled."
  island-locked: "&7Your island is now locked (closed to visitors)."
  island-unlocked: "&aYour island is now open to visitors."

  # Info
  info-header: "&b&l— Island Info —"
  info-owner: "&7Owner: &f{player}"
  info-level: "&7Level: &e{level} &7(&e{points}&7 points)"
  info-members: "&7Members: &e{count}&7/&e{limit}"
  members-header: "&b&l— Island Members —"
  members-entry: "&7• &f{player} &8- {role}"

  # Island settings flags
  flag-on: "&aON"
  flag-off: "&cOFF"

  # Time
  time-no-permission: "&cYou don't have permission to change the island time (VIP+)."

  # Upgrades
  upgrade-success: "&aUpgrade successful!"
  upgrade-max: "&eThis upgrade is already at the maximum level."
  upgrade-need-level: "&cYour island level is too low."
  upgrade-need-money: "&cYou don't have enough money."
  upgrade-failed: "&cThe upgrade could not be completed."
